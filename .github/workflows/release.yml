name: Build Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.0.1"
        required: true
        default: "0.0.1"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.mod

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        shell: pwsh
        run: sdkmanager "platform-tools" "platforms;android-30" "build-tools;30.0.2"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "6.7.1"

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = "${{ github.ref_name }}" -replace '^v', ''
          }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build package
        shell: pwsh
        run: .\scripts\build-release.ps1 -Version "${{ steps.version.outputs.version }}"

      - name: Compress package
        shell: pwsh
        run: Compress-Archive -Path "${{ steps.version.outputs.version }}\*" -DestinationPath "EasyCodex-${{ steps.version.outputs.version }}.zip" -Force

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: EasyCodex-${{ steps.version.outputs.version }}
          path: |
            EasyCodex-${{ steps.version.outputs.version }}.zip
            ${{ steps.version.outputs.version }}/**

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: EasyCodex ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: |
            EasyCodex-${{ steps.version.outputs.version }}.zip
            ${{ steps.version.outputs.version }}/EasyCodex-${{ steps.version.outputs.version }}.exe
            ${{ steps.version.outputs.version }}/EasyCodex-${{ steps.version.outputs.version }}.apk
            ${{ steps.version.outputs.version }}/manifest.json
